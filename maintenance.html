<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Mountain - Under Maintenance</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0b0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -15%;
            left: -10%;
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatA 14s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -15%;
            right: -10%;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatB 18s ease-in-out infinite alternate;
        }

        @keyframes floatA {
            to { transform: translate(5%, 8%) scale(1.1); }
        }
        @keyframes floatB {
            to { transform: translate(-5%, -6%) scale(1.08); }
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: rgba(18, 19, 26, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 24px;
            padding: 52px 44px 44px;
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04),
                0 32px 64px rgba(0,0,0,0.65),
                0 8px 16px rgba(0,0,0,0.4);
            animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Brand */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .brand-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(0,0,0,0.45);
            flex-shrink: 0;
        }

        .brand-name {
            font-family: 'Russo One', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.06em;
            color: #fff;
            line-height: 1;
        }

        .brand-name span { color: #ef4444; }

        /* Icon */
        .icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(220,38,38,0.18), rgba(99,102,241,0.12));
            border: 1px solid rgba(220,38,38,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            box-shadow: 0 8px 32px rgba(220,38,38,0.15);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(220,38,38,0.15); }
            50%       { box-shadow: 0 8px 48px rgba(220,38,38,0.30); }
        }

        .icon-wrap i {
            font-size: 2.2rem;
            color: #ef4444;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f1f3f5;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .sub {
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.65;
            margin-bottom: 32px;
        }

        /* ETA / message box */
        .info-box {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 32px;
            display: none;
        }

        .info-box.visible { display: block; }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 0.95rem;
            color: #d1d5db;
            font-weight: 500;
        }

        /* Progress dots */
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; background: #6366f1; }
        .dots span:nth-child(3) { animation-delay: 0.4s; background: #ef4444; opacity: 0.5; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40%            { transform: scale(1.2); opacity: 1; }
        }

        .footer-note {
            font-size: 0.78rem;
            color: #374151;
        }

        @media (max-width: 480px) {
            .card { padding: 36px 24px 32px; border-radius: 20px; }
            h1 { font-size: 1.35rem; }
            .icon-wrap { width: 68px; height: 68px; border-radius: 18px; }
            .icon-wrap i { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="card">

        <div class="brand">
            <img src="seaMLogo.png" alt="Sea Mountain" class="brand-img">
            <div class="brand-name">SEA<span>MOUNTAIN</span></div>
        </div>

        <div class="icon-wrap">
            <i class="fas fa-tools"></i>
        </div>

        <h1>Under Maintenance</h1>
        <p class="sub" id="mainMsg">We're working hard to improve your experience.<br>We'll be back shortly.</p>

        <div class="info-box" id="etaBox">
            <div class="info-label">Estimated time</div>
            <div class="info-value" id="etaValue">—</div>
        </div>

        <div class="dots">
            <span></span><span></span><span></span>
        </div>

        <div class="footer-note">Thank you for your patience &mdash; Sea Mountain Team</div>

    </div>

    <script>
        /* Particles */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const COLORS = ['rgba(255,255,255,', 'rgba(239,68,68,', 'rgba(139,92,246,'];
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', () => { resize(); init(); });

        function rand(a, b) { return Math.random() * (b - a) + a; }

        function mkParticle() {
            return {
                x: rand(0, canvas.width), y: rand(0, canvas.height),
                r: rand(0.8, 2.2), vx: rand(-0.25, 0.25), vy: rand(-0.35, -0.08),
                alpha: rand(0.2, 0.7), da: rand(0.003, 0.007) * (Math.random() < 0.5 ? 1 : -1),
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            };
        }

        function init() {
            const n = Math.min(Math.floor(canvas.width * canvas.height / 9000), 100);
            particles = Array.from({ length: n }, mkParticle);
        }
        init();

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const maxD = 130;
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                p.alpha += p.da;
                if (p.alpha <= 0.1 || p.alpha >= 0.75) p.da *= -1;
                if (p.y < -10) { p.y = canvas.height + 10; p.x = rand(0, canvas.width); }
                if (p.x < -10) p.x = canvas.width + 10;
                if (p.x > canvas.width + 10) p.x = -10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color + p.alpha + ')';
                ctx.fill();
                for (let j = i + 1; j < particles.length; j++) {
                    const q = particles[j];
                    const dx = p.x - q.x, dy = p.y - q.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < maxD) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
                        ctx.strokeStyle = `rgba(255,255,255,${(1 - d/maxD)*0.12})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(loop);
        }
        loop();

        /* Load message & ETA from Firebase */
        const DB = 'https://sea-mountain-default-rtdb.asia-southeast1.firebasedatabase.app';

        fetch(`${DB}/settings.json`)
            .then(r => r.json())
            .then(s => {
                if (!s) return;
                if (s.maintenanceMessage) {
                    document.getElementById('mainMsg').textContent = s.maintenanceMessage;
                }
                if (s.maintenanceETA) {
                    document.getElementById('etaValue').textContent = s.maintenanceETA;
                    document.getElementById('etaBox').classList.add('visible');
                }
                /* If maintenance was turned off, go back to index */
                if (s.maintenance === false || s.maintenance === null) {
                    window.location.href = 'index.html';
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
