<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Scanner - Sea Mountain</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg-dark: #0f1014;
            --card-bg: #1a1c23;
            --primary: #ff0000;
            --success: #2ecc71;
            --text: #ffffff;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        
        /* HEADER (FIXED & KEMAS) */
        .header { 
            width: 100%; height: 70px;
            background: rgba(20, 20, 25, 0.95); 
            border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px;
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Russo One'; color: #fff; font-size: 1.2rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--primary); }
        .btn-nav { 
            color: #aaa; text-decoration: none; font-weight: 600; font-size: 0.85rem; 
            background: #222; padding: 8px 15px; border-radius: 20px; border: 1px solid #333;
            transition: 0.2s;
        }
        .btn-nav:active { transform: scale(0.95); background: #333; color: #fff; }

        /* MAIN CONTAINER (MOBILE CENTERED) */
        .container { 
            width: 100%; max-width: 500px; /* Limit lebar supaya tak pecah kat PC */
            margin: 0 auto; 
            padding: 20px; 
            flex: 1; 
            display: flex; flex-direction: column; 
        }

        /* DROPDOWN EVENT */
        .control-group { margin-bottom: 20px; position: relative; }
        .custom-select { 
            width: 100%; padding: 15px; 
            background: var(--card-bg); color: #fff; 
            border: 1px solid #444; border-radius: 12px; 
            font-size: 1rem; appearance: none; font-weight: 600;
        }
        .select-arrow { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); pointer-events: none; }

        /* SCANNER BOX (PREMIUM LOOK) */
        .scanner-wrapper {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            aspect-ratio: 1 / 1; /* Kotak Segiempat Sama */
        }

        #reader { width: 100%; height: 100%; }
        #reader video { object-fit: cover; width: 100% !important; height: 100% !important; border-radius: 18px; }

        /* ANIMASI LASER SCANNER */
        .scan-laser {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            animation: scanAnim 2s infinite linear;
            z-index: 10; pointer-events: none;
            opacity: 0.8;
        }
        @keyframes scanAnim {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* MANUAL INPUT (BIGGER FOR THUMBS) */
        .manual-bar { 
            display: flex; flex-direction: column; gap: 10px;
            background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #333;
        }
        .manual-input { 
            width: 100%; background: #111; border: 1px solid #444; color: #fff; 
            padding: 15px; font-size: 1.1rem; border-radius: 10px; text-align: center;
            font-weight: bold; letter-spacing: 1px;
        }
        .manual-input:focus { border-color: var(--primary); }
        
        .btn-check { 
            background: var(--primary); color: #fff; border: none; padding: 15px; width: 100%;
            border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1rem;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }
        .btn-check:active { transform: scale(0.98); }

        /* POPUP RESULT (MODAL) */
        .result-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: none; justify-content: center; align-items: center;
            padding: 20px; backdrop-filter: blur(8px);
        }
        
        .result-card {
            background: #fff; color: #000; width: 100%; max-width: 350px;
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 0 50px rgba(255,255,255,0.1);
            text-align: center;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .status-icon { font-size: 4rem; margin-bottom: 15px; }
        .success { color: #28a745; } .error { color: #dc3545; } .pending { color: #ffc107; }

        .runner-name { font-size: 1.3rem; font-weight: 800; color: #000; margin: 10px 0 5px; line-height: 1.2; }
        .runner-detail { font-size: 0.9rem; color: #666; margin-bottom: 20px; font-weight: 600; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        .info-label { font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .info-val { font-size: 1rem; font-weight: 800; color: #333; }

        /* Shirt size rows */
        .shirt-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        .shirt-row-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 12px; background: #f0f0f0; border-radius: 8px;
        }
        .shirt-row-role { font-size: 0.72rem; font-weight: 800; color: #555; text-transform: uppercase; }
        .shirt-row-name { font-size: 0.78rem; color: #444; }
        .shirt-row-size { font-size: 1rem; font-weight: 900; color: #000; background: #fff; padding: 2px 10px; border-radius: 6px; border: 1px solid #ddd; }

        /* Crew section */
        .crew-section { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 10px; padding: 12px 15px; margin-bottom: 15px; text-align: left; }
        .crew-title { font-size: 0.68rem; font-weight: 800; color: #388e3c; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .crew-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 0.8rem; }
        .crew-item:last-child { border-bottom: none; }
        .crew-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .crew-dot.capt { background: #ff9500; }
        .crew-dot.racer { background: #4caf6e; }
        .crew-role-txt { font-weight: 700; color: #333; }
        .crew-name-txt { color: #666; font-size: 0.75rem; }
        .crew-fallback { font-size: 0.85rem; font-weight: 700; color: #388e3c; }

        /* Section label */
        .section-lbl { font-size: 0.62rem; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; text-align: left; }

        /* Flip camera button */
        .btn-flip {
            position: absolute; bottom: 14px; right: 14px; z-index: 20;
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(0,0,0,0.6); border: 1.5px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.2s, transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-flip:active { background: rgba(255,0,0,0.5); transform: scale(0.92); }
        .btn-flip.spinning i { animation: flipSpin 0.4s ease; }
        @keyframes flipSpin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg); } }

        /* Camera status pill */
        .cam-status {
            position: absolute; top: 12px; left: 12px; z-index: 20;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
            padding: 5px 12px; font-size: 0.62rem; font-weight: 800;
            color: #ccc; text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 5px;
            pointer-events: none;
        }
        .cam-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* Corner frame overlay */
        .scan-corners {
            position: absolute; inset: 0; z-index: 15; pointer-events: none;
        }
        .scan-corners::before, .scan-corners::after,
        .scan-corner-br, .scan-corner-bl {
            content: ''; position: absolute;
            width: 28px; height: 28px; border-color: #ff0000; border-style: solid;
        }
        .scan-corners::before { top: 18px; left: 18px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scan-corners::after  { top: 18px; right: 18px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scan-corner-br { bottom: 18px; right: 18px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .scan-corner-bl { bottom: 18px; left: 18px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

        .btn-scan-next {
            background: #000; color: #fff; border: none; padding: 15px; width: 100%;
            font-weight: 800; font-size: 1rem; border-radius: 50px; cursor: pointer;
        }

        /* Divider */
        .or-divider {
            display: flex; align-items: center; gap: 12px;
            color: #444; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; margin: 16px 0;
        }
        .or-divider::before, .or-divider::after {
            content: ''; flex: 1; height: 1px; background: #2a2c35;
        }

        /* File scan button */
        .btn-file-scan {
            width: 100%; padding: 14px; border-radius: 10px;
            background: transparent; border: 1.5px dashed #444; color: #888;
            font-family: 'Montserrat'; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: 0.2s; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-file-scan:hover, .btn-file-scan:active {
            border-color: var(--primary); color: #fff;
            background: rgba(255,0,0,0.06);
        }
        /* Scan result preview image (hidden) */
        #fileScanPreview { display:none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="admin-dashboard.html" class="logo">SEA<span>SCANNER</span></a>
        <a href="admin-dashboard.html" class="btn-nav"><i class="fas fa-times"></i> Close</a>
    </div>

    <div class="container">
        
        <div class="control-group">
            <select id="eventSelect" class="custom-select">
                <option value="">Loading events...</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
        </div>

        <div class="scanner-wrapper">
            <div id="reader"></div>
            <div class="scan-laser"></div>
            <div class="scan-corners">
                <div class="scan-corner-br"></div>
                <div class="scan-corner-bl"></div>
            </div>
            <div class="cam-status">
                <span class="dot"></span>
                <span id="camLabel">BACK CAM</span>
            </div>
            <button class="btn-flip" id="btnFlip" onclick="flipCamera()" title="Flip Camera">
                <i class="fas fa-camera-rotate"></i>
            </button>
        </div>
        
        <p style="text-align:center; color:#666; font-size:0.8rem; margin-top:-15px; margin-bottom:20px;">
            <i class="fas fa-qrcode"></i> Point camera at Participant's Ticket
        </p>

        <div class="manual-bar">
            <input type="text" id="manualId" class="manual-input" placeholder="Type Registration ID">
            <button onclick="manualCheck()" class="btn-check">CHECK ID</button>
        </div>

        <div class="or-divider">or</div>

        <!-- File / screenshot scan -->
        <input type="file" id="fileScanInput" accept="image/*" style="display:none;"
            onchange="scanFromFile(this)">
        <button class="btn-file-scan" onclick="document.getElementById('fileScanInput').click()">
            <i class="fas fa-image"></i> Scan from Image / Screenshot
        </button>
        <canvas id="fileScanPreview"></canvas>
        <!-- Separate hidden element for file scan instance -->
        <div id="fileScanTarget" style="display:none;"></div>

    </div>

    <div id="resultModal" class="result-modal">
        <div class="result-card">
            
            <div id="statusIcon" class="status-icon success"><i class="fas fa-check-circle"></i></div>
            <div id="statusText" style="font-weight:900; font-size:1.5rem; text-transform:uppercase;">VERIFIED</div>
            
            <div class="runner-name" id="rName">ALI BIN ABU</div>
            <div class="runner-detail" id="rDetail">Payment Confirmed</div>
            
            <div class="info-grid">
                <div>
                    <div class="info-label">Category</div>
                    <div class="info-val" id="rCat">10KM</div>
                </div>
                <div>
                    <div class="info-label">Team Size</div>
                    <div class="info-val" id="rTeamSize">-</div>
                </div>
            </div>

            <!-- Per-racer shirt sizes -->
            <div id="rShirtSection" style="display:none; margin-bottom:5px;">
                <div class="section-lbl"><i class="fas fa-tshirt" style="margin-right:4px;"></i>T-Shirt Sizes</div>
                <div class="shirt-rows" id="rShirtRows"></div>
            </div>

            <!-- Personal crew -->
            <div id="rCrewSection" style="display:none;">
                <div class="crew-section">
                    <div class="crew-title"><i class="fas fa-user-friends"></i> Personal Crew <span id="rCrewCount" style="background:rgba(56,142,60,0.15); padding:1px 8px; border-radius:10px;"></span></div>
                    <div id="rCrewItems"></div>
                </div>
            </div>

            <button class="btn-scan-next" onclick="resetScanner()">SCAN NEXT</button>
        </div>
    </div>

    <audio id="beepSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBZzcjRx3KhBaHaahSUee1ySRIlRgVmi3o",
        authDomain: "sea-mountain.firebaseapp.com",
        databaseURL: "https://sea-mountain-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sea-mountain",
        storageBucket: "sea-mountain.firebasestorage.app",
        messagingSenderId: "812228825024",
        appId: "1:812228825024:web:717049c1a64b39c8a60225"
    };

    const adminApp = initializeApp(firebaseConfig, "admin");
    const auth = getAuth(adminApp);
    const db   = getDatabase(adminApp);
    const ALLOWED_ADMIN = "admin@sm.com";

    let html5QrCode;
    let isScanning    = true;
    let cameraStarted = false;
    let currentFacing = "environment"; // "environment"=back, "user"=front

    // 1. AUTH CHECK — same as all admin pages
    auth.authStateReady().then(() => {
        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== ALLOWED_ADMIN) {
                alert("Access Denied. Please login as Admin.");
                window.location.href = "admin-login.html";
            } else {
                initPage();
            }
        });
    });

    function initPage() {
        // LOAD EVENTS
        const eventSelect = document.getElementById('eventSelect');
        onValue(ref(db, 'events'), (snapshot) => {
            eventSelect.innerHTML = '<option value="">-- Select Active Event --</option>';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(key => {
                    if (!data[key].isArchived) {
                        eventSelect.innerHTML += `<option value="${key}">${data[key].title}</option>`;
                    }
                });
            }
        });

        // START CAMERA
        startCamera();
    }

    // 2. SETUP SCANNER — auto-start back camera
    html5QrCode     = new Html5Qrcode("reader");        // camera instance
    const fileQrCode = new Html5Qrcode("fileScanTarget"); // file scan instance

    function startCamera(facing) {
        if (facing) currentFacing = facing;
        return html5QrCode.start(
            { facingMode: currentFacing },
            { fps: 10, qrbox: { width: 230, height: 230 } },
            (decodedText) => {
                if (!isScanning) return;
                const eventId = eventSelect.value;
                if (!eventId) { alert("Please select an event first!"); return; }
                verifyTicket(eventId, decodedText);
            },
            () => {}
        ).then(() => {
            cameraStarted = true;
            document.getElementById('camLabel').innerText =
                currentFacing === 'environment' ? 'BACK CAM' : 'FRONT CAM';
            // Hide library default UI
            document.querySelectorAll('#reader__scan_region, #reader__dashboard')
                .forEach(el => { if(el) el.style.display = 'none'; });
        }).catch(err => {
            console.warn("Camera error:", err);
            document.getElementById('reader').innerHTML =
                `<div style="color:#ff4d4d; text-align:center; padding:40px 20px; font-size:0.85rem;">
                    <i class="fas fa-camera-slash" style="font-size:2rem; display:block; margin-bottom:10px;"></i>
                    Camera access denied.<br>Allow camera permission &amp; reload.
                </div>`;
        });
    }

    // Flip camera — stop current, start opposite
    window.flipCamera = function() {
        const btn = document.getElementById('btnFlip');
        btn.classList.add('spinning');
        setTimeout(() => btn.classList.remove('spinning'), 420);

        const nextFacing = currentFacing === 'environment' ? 'user' : 'environment';

        if (cameraStarted) {
            html5QrCode.stop().then(() => {
                cameraStarted = false;
                startCamera(nextFacing);
            }).catch(() => { startCamera(nextFacing); });
        } else {
            startCamera(nextFacing);
        }
    }

    // Camera started via initPage() after auth check


    // 3. VERIFY TICKET LOGIC
    function verifyTicket(eventId, regId) {
        isScanning = false;
        
        get(ref(db, `registrations/${eventId}/${regId}`)).then((snapshot) => {
            const modal = document.getElementById('resultModal');
            modal.style.display = 'flex'; 

            if(snapshot.exists()) {
                const data = snapshot.val();
                
                if(data.status && data.status.toLowerCase() === 'paid') {
                    // SUCCESS
                    document.getElementById('beepSound').play();
                    showResult('success', data);
                    
                    // Auto Check-in (Optional)
                    update(ref(db, `registrations/${eventId}/${regId}`), { checked_in: true, check_in_time: new Date().toLocaleString() });

                } else {
                    // PENDING
                    showResult('pending', data);
                }
            } else {
                // NOT FOUND
                showResult('error', null);
            }
        });
    }

    // 4. SHOW RESULT POPUP
    function showResult(type, data) {
        const icon = document.getElementById('statusIcon');
        const text = document.getElementById('statusText');
        
        const name   = document.getElementById('rName');
        const detail = document.getElementById('rDetail');
        const cat    = document.getElementById('rCat');

        // ── Shirt sizes helper ──────────────────────────────────
        function buildShirtRows(data) {
            const sec  = document.getElementById('rShirtSection');
            const rows = document.getElementById('rShirtRows');
            if (!data || !data.racers || !Array.isArray(data.racers)) {
                sec.style.display = 'none'; return;
            }
            sec.style.display = 'block';
            rows.innerHTML = data.racers.map((r, i) => {
                const role  = i === 0 ? '★ Captain' : `Racer ${i + 1}`;
                const fname = r.name ? r.name.split(' ')[0] : role;
                const shirt = (r.shirt || '-').toUpperCase();
                return `<div class="shirt-row-item">
                    <div>
                        <div class="shirt-row-role">${role}</div>
                        <div class="shirt-row-name">${fname}</div>
                    </div>
                    <div class="shirt-row-size">${shirt}</div>
                </div>`;
            }).join('');
        }

        // ── Crew helper ──────────────────────────────────────────
        function buildCrewSection(data) {
            const sec   = document.getElementById('rCrewSection');
            const items = document.getElementById('rCrewItems');
            const countEl = document.getElementById('rCrewCount');
            const crew  = parseInt(data && data.crewCount) || 0;
            if (crew === 0) { sec.style.display = 'none'; return; }
            sec.style.display = 'block';
            countEl.innerText = crew + ' Pax';
            const crewRacers = data.crewRacers || [];
            if (crewRacers.length > 0) {
                items.innerHTML = crewRacers.map(cr => {
                    const isCapt = cr.role === 'Captain';
                    const dot    = isCapt ? 'crew-dot capt' : 'crew-dot racer';
                    const icon   = isCapt ? '★' : '●';
                    const fname  = cr.name ? cr.name.split(' ')[0] : cr.role;
                    return `<div class="crew-item">
                        <span class="${dot}"></span>
                        <span class="crew-role-txt">${icon} ${cr.role}</span>
                        <span class="crew-name-txt">— ${fname}</span>
                    </div>`;
                }).join('');
            } else {
                items.innerHTML = `<div class="crew-fallback">${crew} crew confirmed</div>`;
            }
        }

        if(type === 'success') {
            icon.className = "status-icon success";
            icon.innerHTML = '<i class="fas fa-check-circle"></i>';
            text.innerText = "VERIFIED";
            text.style.color = "#28a745";

            const displayName = data.teamName || data.captainName || data.first_name || '-';
            const racerCount  = (data.racers && Array.isArray(data.racers)) ? data.racers.length : 1;
            name.innerText    = displayName.toUpperCase();
            detail.innerText  = "Paid & Valid";
            cat.innerText     = data.category || '-';
            document.getElementById('rTeamSize').innerText = racerCount + (racerCount > 1 ? ' Racers' : ' Racer');

            buildShirtRows(data);
            buildCrewSection(data);

        } else if (type === 'pending') {
            icon.className = "status-icon pending";
            icon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            text.innerText = "NOT PAID";
            text.style.color = "#ffc107";

            const displayName = data.teamName || data.captainName || data.first_name || '-';
            name.innerText   = displayName.toUpperCase();
            detail.innerText = "Status: Pending Payment";
            cat.innerText    = data.category || '-';
            document.getElementById('rTeamSize').innerText = '-';
            document.getElementById('rShirtSection').style.display = 'none';
            document.getElementById('rCrewSection').style.display  = 'none';

        } else {
            icon.className = "status-icon error";
            icon.innerHTML = '<i class="fas fa-times-circle"></i>';
            text.innerText = "INVALID";
            text.style.color = "#dc3545";

            name.innerText   = "UNKNOWN TICKET";
            detail.innerText = "Data not found in system.";
            cat.innerText    = "-";
            document.getElementById('rTeamSize').innerText = '-';
            document.getElementById('rShirtSection').style.display = 'none';
            document.getElementById('rCrewSection').style.display  = 'none';
        }
    }

    // 5. RESET SCANNER
    window.resetScanner = function() {
        document.getElementById('resultModal').style.display = 'none';
        document.getElementById('manualId').value = "";
        setTimeout(() => { isScanning = true; }, 800); // Small delay before re-scanning
    }

    // 6. SCAN FROM FILE / SCREENSHOT
    // Uses a SEPARATE Html5Qrcode instance (fileQrCode) — camera instance
    // cannot do scanFile() while camera is running.
    window.scanFromFile = function(input) {
        if (!input.files || !input.files[0]) return;

        const eventId = document.getElementById('eventSelect').value;
        if (!eventId) {
            alert("Please select an event first!");
            input.value = "";
            return;
        }

        const file = input.files[0];

        fileQrCode.scanFile(file, false)
            .then(decodedText => {
                input.value = "";
                verifyTicket(eventId, decodedText.trim());
            })
            .catch(() => {
                input.value = "";
                alert("No QR code found in this image.
Tips:
• Make sure QR is clear & not blurry
• Try a closer crop of the QR code");
            });
    }

    // 7. MANUAL CHECK
    window.manualCheck = function() {
        const id = document.getElementById('manualId').value.trim();
        const eventId = eventSelect.value;
        
        if(!eventId) return alert("Select Event first!");
        if(!id) return alert("Enter Registration ID");

        verifyTicket(eventId, id);
    }

</script>

</body>
</html>
