<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Mountain - Log In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0b0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background ambient blobs */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatA 12s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatB 15s ease-in-out infinite alternate;
        }

        @keyframes floatA {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(4%, 6%) scale(1.08); }
        }
        @keyframes floatB {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-4%, -5%) scale(1.06); }
        }

        /* Particle canvas */
        #particleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Grid dot pattern */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(18, 19, 26, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px 40px;
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04),
                0 32px 64px rgba(0, 0, 0, 0.6),
                0 8px 16px rgba(0, 0, 0, 0.4);
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Brand */
        .brand {
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .brand-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(0,0,0,0.45);
            flex-shrink: 0;
        }

        .brand-name {
            font-family: 'Russo One', sans-serif;
            font-size: 1.45rem;
            letter-spacing: 0.06em;
            color: #fff;
            line-height: 1;
        }

        .brand-name span {
            color: #ef4444;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.07);
        }

        .divider span {
            font-size: 0.75rem;
            color: #4b5563;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* Google Button — proper Google style */
        .google-btn {
            width: 100%;
            padding: 13px 20px;
            background: #ffffff;
            color: #1f2937;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .google-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            transition: background 0.2s;
        }

        .google-btn:hover {
            background: #f1f3f4;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            transform: translateY(-1px);
        }

        .google-btn:hover::before {
            background: rgba(0,0,0,0.02);
        }

        .google-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* Official Google "G" SVG logo */
        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Loading state */
        .google-btn.loading {
            pointer-events: none;
            opacity: 0.75;
        }

        .google-btn.loading .btn-text::after {
            content: '...';
            animation: dots 1.2s steps(3, end) infinite;
        }

        @keyframes dots {
            0%, 100% { content: '.'; }
            33%       { content: '..'; }
            66%       { content: '...'; }
        }

        /* Footer */
        .card-footer {
            margin-top: 24px;
            font-size: 0.775rem;
            color: #4b5563;
            line-height: 1.6;
        }

        .card-footer a {
            color: #6b7280;
            text-decoration: underline;
            text-decoration-color: rgba(107, 114, 128, 0.4);
            text-underline-offset: 2px;
            transition: color 0.2s;
        }

        .card-footer a:hover {
            color: #9ca3af;
        }

        /* Mobile */
        @media (max-width: 480px) {
            body { padding: 16px; align-items: flex-start; padding-top: 60px; }

            .card {
                padding: 36px 24px 32px;
                border-radius: 20px;
            }

            .brand-img { width: 38px; height: 38px; }
            .brand-name { font-size: 1.25rem; }
        }

        @media (max-width: 360px) {
            .card { padding: 28px 18px 26px; }
            .brand-img { width: 34px; height: 34px; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <div class="bg-grid"></div>

    <div class="card">

        <!-- Brand -->
        <div class="brand">
            <img src="seaMLogo.png" alt="Sea Mountain" class="brand-img">
            <div class="brand-name">SEA<span>MOUNTAIN</span></div>
        </div>

        <!-- Divider -->
        <div class="divider"><span>Continue with</span></div>

        <!-- Google Button -->
        <button id="googleBtn" class="google-btn">
            <!-- Official Google "G" logo colours -->
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="btn-text">Continue with Google</span>
        </button>

        <!-- Footer -->
        <div class="card-footer">
            By continuing, you agree to our
            <a href="https://drive.google.com/file/d/1pUyN-ZfWulg2QppeesnUU1wuN2g-hiJl/view?usp=sharing">Company Policy</a>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        const COLORS = ['rgba(255,255,255,', 'rgba(239,68,68,', 'rgba(139,92,246,'];
        let particles = [];

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', () => { resize(); init(); });

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function createParticle() {
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            return {
                x:     rand(0, canvas.width),
                y:     rand(0, canvas.height),
                r:     rand(0.8, 2.2),
                vx:    rand(-0.25, 0.25),
                vy:    rand(-0.35, -0.08),
                alpha: rand(0.2, 0.7),
                da:    rand(0.003, 0.007) * (Math.random() < 0.5 ? 1 : -1),
                color
            };
        }

        function init() {
            const count = Math.floor((canvas.width * canvas.height) / 9000);
            particles = Array.from({ length: Math.min(count, 100) }, createParticle);
        }
        init();

        function drawLine(a, b, dist, maxDist) {
            const alpha = (1 - dist / maxDist) * 0.12;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const maxDist = 130;

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];

                p.x  += p.vx;
                p.y  += p.vy;
                p.alpha += p.da;
                if (p.alpha <= 0.1 || p.alpha >= 0.75) p.da *= -1;

                if (p.y < -10) { p.y = canvas.height + 10; p.x = rand(0, canvas.width); }
                if (p.x < -10) p.x = canvas.width + 10;
                if (p.x > canvas.width + 10) p.x = -10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color + p.alpha + ')';
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    const q = particles[j];
                    const dx = p.x - q.x, dy = p.y - q.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < maxDist) drawLine(p, q, dist, maxDist);
                }
            }

            requestAnimationFrame(loop);
        }
        loop();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZzcjRx3KhBaHaahSUee1ySRIlRgVmi3o",
            authDomain: "sea-mountain.firebaseapp.com",
            databaseURL: "https://sea-mountain-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sea-mountain",
            storageBucket: "sea-mountain.firebasestorage.app",
            messagingSenderId: "812228825024",
            appId: "1:812228825024:web:717049c1a64b39c8a60225"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('googleBtn').addEventListener('click', () => {
            const btn = document.getElementById('googleBtn');
            btn.classList.add('loading');

            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;

                    sessionStorage.setItem("isLoggedIn", "true");
                    sessionStorage.setItem("userEmail", user.email);
                    sessionStorage.setItem("userName", user.displayName);

                    const userRef = ref(db, 'users/' + user.uid);
                    get(userRef).then((snapshot) => {
                        if (!snapshot.exists()) {
                            set(userRef, {
                                username: user.displayName,
                                email: user.email,
                                role: "user",
                                provider: "google"
                            });
                        }
                    });

                    window.location.href = "index.html";
                })
                .catch((error) => {
                    btn.classList.remove('loading');
                    console.error("Error:", error.code, error.message);
                    alert("Gagal Login: " + error.message);
                });
        });
    </script>
</body>
</html>
